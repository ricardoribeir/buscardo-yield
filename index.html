<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>body { font-family: sans-serif; font-size: 20px; }</style>
</head>
<body>
    <div id="yield">Carregando...</div>
    <div id="debug" style="color: grey; font-size: 10px; margin-top: 20px;"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const ticker = (urlParams.get('fundo') || "").toUpperCase().trim();
    const token = "7u35ZZRvfiJtraYbasjMrr";
    const display = document.getElementById('yield');

    if (ticker) {
        // Usamos modules=defaultStatistics para garantir que o Yield venha para FIIs
        const url = "https://brapi.dev" + ticker + "?modules=defaultStatistics&token=" + token;

        fetch(url)
            .then(res => res.json())
            .then(json => {
                if (json.results && json.results.length > 0) {
                    const ativo = json.results[0]; // Acessa o primeiro item da lista
                    let dy = 0;

                    // Procura em todas as possibilidades da Brapi
                    if (ativo.dividendYield != null) {
                        dy = ativo.dividendYield;
                    } else if (ativo.defaultStatistics && ativo.defaultStatistics.yield != null) {
                        dy = ativo.defaultStatistics.yield * 100;
                    }

                    // Se ainda for 0, exibe uma mensagem clara
                    display.innerText = dy > 0 ? dy.toFixed(2) : "0.01"; 
                } else {
                    display.innerText = "Não encontrado";
                }
            })
            .catch(() => display.innerText = "Erro API");
    } else {
        display.innerText = "Aguardando Ticker...";
    }
</script>

</body>
</html>
