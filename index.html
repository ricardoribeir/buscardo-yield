<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>body { font-family: sans-serif; font-size: 20px; }</style>
</head>
<body>
    <div id="yield">Carregando...</div>
    <div id="debug" style="color: grey; font-size: 10px; margin-top: 20px;"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ticker = (urlParams.get('fundo') || "").toUpperCase().trim();
        const token = "7u35ZZRvfiJtraYbasjMrr";
        const display = document.getElementById('yield');

        if (!ticker) {
            display.innerText = "Aguardando Ticker... (Ex: ?fundo=MXRF11)";
        } else {
            // URL montada sem símbolos complexos para evitar erros de DNS
            const url = "https://brapi.dev/api/quote/" + ticker + "?token=" + token + "&fundamental=true";
            
            document.getElementById('debug').innerText = "URL: " + url;

            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error("Erro HTTP: " + res.status);
                    return res.json();
                })
                .then(json => {
                    if (json.results && json.results.length > 0) {
                        const ativo = json.results[0];
                        // Procura o yield no campo direto ou no módulo estatístico
                        let dy = ativo.dividendYield || (ativo.defaultStatistics ? ativo.defaultStatistics.yield * 100 : 0);
                        display.innerText = dy.toFixed(2);
                    } else {
                        display.innerText = "Ticker não encontrado";
                    }
                })
                .catch(err => {
                    display.innerText = "Erro: " + err.message;
                    console.error(err);
                });
        }
    </script>
</body>
</html>
