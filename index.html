<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Yield API</title>
</head>
<body>
    <!-- O Google Sheets vai ler o número dentro desta DIV -->
    <div id="yield">0.00</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ticker = (urlParams.get('fundo') || "MXRF11").toUpperCase().trim();
        const token = "7u35ZZRvfiJtraYbasjMrr";

        // MONTAGEM MANUAL E FORÇADA DA URL (NÃO ALTERE AS BARRAS)
        const urlFinal = "https://brapi.dev" + ticker + "?token=" + token + "&fundamental=true";

        console.log("URL de Acesso:", urlFinal);

        fetch(urlFinal)
            .then(res => {
                if (!res.ok) throw new Error("Erro HTTP: " + res.status);
                return res.json();
            })
            .then(json => {
                if (json.results && json.results.length > 0) {
                    const ativo = json.results[0]; // ACESSA O PRIMEIRO ITEM DA LISTA
                    
                    // Busca o DY nos dois campos possíveis da Brapi para FIIs
                    let dy = ativo.dividendYield || (ativo.defaultStatistics ? ativo.defaultStatistics.yield * 100 : 0);
                    
                    // Exibe o número com 2 casas decimais (ex: 12.50)
                    document.getElementById('yield').innerText = dy.toFixed(2);
                } else {
                    document.getElementById('yield').innerText = "0.01";
                }
            })
            .catch(err => {
                console.error("Erro na Requisição:", err);
                document.getElementById('yield').innerText = "Erro";
            });
    </script>
</body>
</html>
